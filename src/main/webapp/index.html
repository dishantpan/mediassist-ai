<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediAssist — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 10px; }
        .form-control { border-radius: 10px; padding: 12px; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="container" style="max-width: 420px;">
    <div class="card p-5">
        <div class="text-center mb-4">
            <i class="fas fa-hospital-user fa-3x text-primary mb-3"></i>
            <h2 class="fw-bold">MediAssist</h2>
            <p class="text-muted">Smart Department Recommendation</p>
        </div>

        <!-- Error / Success Messages -->
        <div id="errorMsg" class="alert alert-danger d-none"></div>
        <div id="successMsg" class="alert alert-success d-none"></div>

        <form action="login" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="email" class="form-control"
                       placeholder="Enter your email" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>
        <p class="text-center mt-3 mb-0">
            New user? <a href="register.html" class="text-primary fw-semibold">Register here</a>
        </p>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'invalid') {
        document.getElementById('errorMsg').classList.remove('d-none');
        document.getElementById('errorMsg').textContent = 'Invalid email or password!';
    }
    if (params.get('success') === 'registered') {
        document.getElementById('successMsg').classList.remove('d-none');
        document.getElementById('successMsg').textContent = 'Registration successful! Please login.';
    }
</script>
</body>
</html>
