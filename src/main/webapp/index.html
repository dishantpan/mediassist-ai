    /* ─────────────────────────────────────────
       Login Page — Additional Inline Styles
    ───────────────────────────────────────── */

    /* Full-page centering */
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    /* Login Card */
    .login-card {
      width: 100%;
      max-width: 460px;
      padding: 44px 40px 36px;
      position: relative;
      overflow: hidden;
      animation: cardSlideUp 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }

    @keyframes cardSlideUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ── ECG / Heartbeat SVG background inside card ── */
    .ecg-bg {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      opacity: 0.07;
      pointer-events: none;
      overflow: hidden;
    }

    .ecg-path {
      stroke: url(#ecgGradient);
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
      animation: ecgDraw 3s ease-in-out 0.8s forwards, ecgPulse 3s ease-in-out 3.8s infinite;
    }

    @keyframes ecgDraw {
      to { stroke-dashoffset: 0; }
    }

    @keyframes ecgPulse {
      0%, 100% { opacity: 0.07; }
      50% { opacity: 0.18; }
    }

    /* ── Brand Section ── */
    .brand-section {
      text-align: center;
      margin-bottom: 28px;
    }

    .brand-icon-login {
      width: 68px;
      height: 68px;
      border-radius: 18px;
      background: linear-gradient(135deg, #0ea5e9 0%, #14b8a6 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: white;
      box-shadow:
        0 8px 32px rgba(14, 165, 233, 0.45),
        0 0 0 8px rgba(14, 165, 233, 0.1),
        0 0 0 16px rgba(14, 165, 233, 0.05);
      margin-bottom: 18px;
      animation: heartbeat 2s ease-in-out infinite;
      position: relative;
    }

    .brand-icon-login::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 22px;
      border: 1px solid rgba(14, 165, 233, 0.3);
      animation: ringPulse 2s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.5; }
    }

    .login-title {
      font-family: 'Poppins', sans-serif;
      font-size: 1.85rem;
      font-weight: 800;
      background: linear-gradient(135deg, #38bdf8 0%, #14b8a6 60%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      line-height: 1.1;
    }

    .login-subtitle {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Trust Pills Row ── */
    .trust-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .trust-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 9999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text-secondary);
      background: rgba(14, 165, 233, 0.05);
      border: 1px solid rgba(14, 165, 233, 0.15);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all 0.25s ease;
      cursor: default;
      white-space: nowrap;
    }

    .trust-pill:hover {
      background: rgba(14, 165, 233, 0.12);
      border-color: rgba(14, 165, 233, 0.35);
      color: #0ea5e9;
      transform: translateY(-1px);
    }

      background: rgba(148, 163, 184, 0.15);

      cursor: pointer;
      font-size: 0.9rem;
      transition: color 0.2s ease;
      z-index: 2;
      background: none;
      border: none;
      padding: 4px;
      line-height: 1;
    }

      color: #0ea5e9;

      font-size: 0.97rem;

      border-radius: 14px;

      border: none;

      overflow: hidden;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 6px 24px rgba(14, 165, 233, 0.4), 0 2px 6px rgba(0, 0, 0, 0.2);

    .btn-login:hover {

      box-shadow: 0 10px 36px rgba(14, 165, 233, 0.55), 0 4px 12px rgba(0, 0, 0, 0.25);
      background: linear-gradient(135deg, #38bdf8 0%, #14b8a6 100%);
    }

    .btn-login:active {
      transform: translateY(0);
      box-shadow: 0 4px 16px rgba(14, 165, 233, 0.35);
    }

    .btn-login:disabled {
      opacity: 0.75;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner inside button */
    .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {

    }

    .btn-login.loading .btn-spinner { display: inline-block; }
    .btn-login.loading .btn-icon { display: none; }
    .btn-login.loading .btn-label { opacity: 0.8; }

    /* ── Ripple ── */
    .ripple-btn .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      animation: rippleAnim 0.65s linear;
      background-color: rgba(255, 255, 255, 0.28);

    }

  <script>
    /* ═══════════════════════════════════════════════════════════════
       MediAssist AI — Login Page JavaScript
       Features: Particles · Ripple · Eye Toggle · Toasts · URL Params
    ═══════════════════════════════════════════════════════════════ */

    /* ─────────────────────────────────────────
       1. PARTICLE CANVAS — Medical Symbols
    ───────────────────────────────────────── */
    (function initParticles() {
      const canvas  = document.getElementById('particles-canvas');
      const ctx     = canvas.getContext('2d');
      const SYMBOLS = ['+', '♥', '✚', '·', '•', '+', '♥'];
      const COUNT   = 40;

      let W, H, particles = [];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      function createParticle(fromBottom) {
        const size = random(9, 20);
        return {
          x      : random(0, W),
          y      : fromBottom ? H + size : random(-size, H + size),
          vy     : -random(0.25, 0.75),      // float upward
          vx     : random(-0.15, 0.15),      // slight horizontal drift
          size   : size,
          opacity: random(0.04, 0.18),
          symbol : SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)],
          color  : ['rgba(14,165,233,', 'rgba(20,184,166,', 'rgba(6,182,212,'][
                     Math.floor(Math.random() * 3)],
          wobble : random(0, Math.PI * 2),
          wobbleSpeed: random(0.005, 0.02),
        };
      }

      function initParticles() {
        particles = [];
        for (let i = 0; i < COUNT; i++) {
          particles.push(createParticle(false));
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        particles.forEach(p => {
          p.wobble += p.wobbleSpeed;
          p.x += p.vx + Math.sin(p.wobble) * 0.12;
          p.y += p.vy;

          if (p.y < -p.size * 2) {
            Object.assign(p, createParticle(true));
          }

          ctx.save();
          ctx.globalAlpha = p.opacity;
          ctx.font = `${p.size}px "Inter", sans-serif`;
          ctx.fillStyle = p.color + p.opacity + ')';
          ctx.textAlign  = 'center';
          ctx.textBaseline = 'middle';

          // Very subtle glow for larger symbols
          if (p.size > 14) {
            ctx.shadowColor = p.color + '0.6)';
            ctx.shadowBlur  = 8;
          }

          ctx.fillText(p.symbol, p.x, p.y);
          ctx.restore();
        });

        requestAnimationFrame(draw);
      }

      resize();
      initParticles();
      draw();
      window.addEventListener('resize', () => {
        resize();
        initParticles();
      });
    }());


    /* ─────────────────────────────────────────
       2. TOAST NOTIFICATION SYSTEM
    ───────────────────────────────────────── */
    /**
     * showToast(message, type, duration)
     * @param {string} message  — Toast body text
     * @param {string} type     — 'error' | 'success' | 'info'
     * @param {number} duration — Auto-dismiss ms (default 4500)
     */
    function showToast(message, type = 'info', duration = 4500) {
      const container = document.getElementById('toast-container');
      const icons = {
        error  : 'fa-circle-xmark',
        success: 'fa-circle-check',
        info   : 'fa-circle-info',
      };
      const labels = {
        error  : 'Error',
        success: 'Success',
        info   : 'Notice',
      };

      const toast = document.createElement('div');
      toast.className = `med-toast toast-${type}`;
      toast.setAttribute('role', 'alert');
      toast.setAttribute('aria-live', 'assertive');
      toast.innerHTML = `
        <span class="toast-icon">
          <i class="fas ${icons[type] || icons.info}"></i>
        </span>
        <div style="flex:1; min-width:0;">
          <div style="font-size:0.75rem; opacity:0.6; text-transform:uppercase;
                      letter-spacing:0.06em; margin-bottom:2px;">
            ${labels[type] || 'Notice'}
          </div>
          <div style="line-height:1.35; color:rgba(240,249,255,0.92);">${message}</div>
        </div>
        <button onclick="dismissToast(this.closest('.med-toast'))"
                style="background:none;border:none;color:rgba(240,249,255,0.4);
                       cursor:pointer;padding:2px 4px;font-size:0.9rem;
                       flex-shrink:0; transition:color 0.2s ease;"
                onmouseover="this.style.color='rgba(240,249,255,0.9)'"
                onmouseout="this.style.color='rgba(240,249,255,0.4)'"
                aria-label="Dismiss notification">
          <i class="fas fa-xmark"></i>
        </button>
      `;

      container.appendChild(toast);

      // Auto-dismiss
      const timer = setTimeout(() => dismissToast(toast), duration);
      toast._dismissTimer = timer;
    }

    function dismissToast(toast) {
      if (!toast || toast._dismissed) return;
      toast._dismissed = true;
      clearTimeout(toast._dismissTimer);
      toast.classList.add('toast-out');
      toast.addEventListener('animationend', () => toast.remove(), { once: true });
    }


    /* ─────────────────────────────────────────
       3. URL PARAM → TOAST  (preserved logic)
    ───────────────────────────────────────── */
    (function handleURLParams() {
      const params = new URLSearchParams(window.location.search);

      if (params.get('error') === 'invalid') {
        // Slight delay so card animation finishes first
        setTimeout(() => {
          showToast(
            'Invalid email or password. Please try again.',
            'error',
            5000
          );
        }, 750);
      }

      if (params.get('success') === 'registered') {
        setTimeout(() => {
          showToast(
            'Account created successfully! You can now log in.',
            'success',
            5500
          );
        }, 750);
      }
    }());


    /* ─────────────────────────────────────────
       4. PASSWORD EYE TOGGLE
    ───────────────────────────────────────── */
    (function initEyeToggle() {
      const passwordInput = document.getElementById('passwordInput');
      const eyeToggle     = document.getElementById('eyeToggle');
      const eyeIcon       = document.getElementById('eyeIcon');

      eyeToggle.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        eyeIcon.className  = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
        eyeToggle.setAttribute(
          'aria-label',
          isPassword ? 'Hide password' : 'Show password'
        );
      });
    }());


    /* ─────────────────────────────────────────
       5. RIPPLE EFFECT ON BUTTON
    ───────────────────────────────────────── */
    (function initRipple() {
      document.querySelectorAll('.ripple-btn').forEach(btn => {
        btn.addEventListener('click', function (e) {
          const rect   = this.getBoundingClientRect();
          const size   = Math.max(rect.width, rect.height) * 1.6;
          const x      = e.clientX - rect.left - size / 2;
          const y      = e.clientY - rect.top  - size / 2;

          const ripple = document.createElement('span');
          ripple.className = 'ripple';
          ripple.style.cssText = `
            width: ${size}px;
            height: ${size}px;
            left: ${x}px;
            top: ${y}px;
          `;
          this.appendChild(ripple);
          ripple.addEventListener('animationend', () => ripple.remove(), { once: true });
        });
      });
    }());


    /* ─────────────────────────────────────────
       6. FORM SUBMIT — Loading State
    ───────────────────────────────────────── */
    (function initFormSubmit() {
      const form      = document.getElementById('loginForm');
      const loginBtn  = document.getElementById('loginBtn');
      const btnLabel  = document.getElementById('btnLabel');
      const btnSpinner = document.getElementById('btnSpinner');
      const btnIcon   = document.getElementById('btnIcon');

      form.addEventListener('submit', function (e) {
        const email    = document.getElementById('emailInput').value.trim();
        const password = document.getElementById('passwordInput').value;

        // Basic client-side validation
        if (!email || !password) {
          e.preventDefault();
          showToast('Please fill in both email and password.', 'error');
          return;
        }

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          e.preventDefault();
          showToast('Please enter a valid email address.', 'error');
          return;
        }

        // Activate loading state
        loginBtn.classList.add('loading');
        loginBtn.disabled = true;
        btnLabel.textContent = 'Analyzing...';
        btnSpinner.style.display = 'inline-block';
        btnIcon.style.display = 'none';
      });
    }());


    /* ─────────────────────────────────────────
       7. CARD FADE-IN ON LOAD (guaranteed)
    ───────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {
      // Card animation is CSS-driven (cardSlideUp keyframe)
      // Ensure the card is visible even if animation fails
      const card = document.querySelector('.login-card');
      if (card) {
        // Force repaint
        card.style.willChange = 'transform, opacity';
        setTimeout(() => {
          card.style.willChange = 'auto';
        }, 900);
      }
    });

  </script>
