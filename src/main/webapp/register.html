<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediAssist — Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); min-height: 100vh; }
        .card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); border: none; border-radius: 10px; }
        .form-control { border-radius: 10px; padding: 12px; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-4">
<div class="container" style="max-width: 440px;">
    <div class="card p-5">
        <div class="text-center mb-4">
            <i class="fas fa-user-plus fa-3x text-success mb-3"></i>
            <h2 class="fw-bold">Create Account</h2>
            <p class="text-muted">Join MediAssist today</p>
        </div>

        <div id="errorMsg" class="alert alert-danger d-none"></div>

        <form action="register" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Full Name</label>
                <input type="text" name="name" class="form-control"
                       placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="email" class="form-control"
                       placeholder="Enter your email" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2 fw-bold text-white">
                <i class="fas fa-user-plus me-2"></i>Register
            </button>
        </form>
        <p class="text-center mt-3 mb-0">
            Already registered? <a href="index.html" class="text-success fw-semibold">Login here</a>
        </p>
    </div>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'exists') {
        document.getElementById('errorMsg').classList.remove('d-none');
        document.getElementById('errorMsg').textContent = 'Email already registered!';
    }
    if (params.get('error') === 'failed') {
        document.getElementById('errorMsg').classList.remove('d-none');
        document.getElementById('errorMsg').textContent = 'Registration failed. Try again.';
    }
</script>
</body>
</html>
