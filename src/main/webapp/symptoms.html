<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediAssist — Select Symptoms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4ff; }
        .navbar { background: linear-gradient(135deg, #667eea, #764ba2); }
        .symptom-card { border-radius: 15px; border: 2px solid #e0e0e0; transition: all 0.2s; cursor: pointer; }
        .symptom-card:hover { border-color: #667eea; background: #f0f0ff; }
        .symptom-card input:checked ~ .card-body { background: #667eea22; }
        .section-title { color: #667eea; font-weight: 700; border-left: 4px solid #667eea; padding-left: 10px; }
        .btn-submit { background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 12px; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold"><i class="fas fa-heartbeat me-2"></i>MediAssist</span>
    <a href="history" class="btn btn-outline-light btn-sm me-2">
        <i class="fas fa-history me-1"></i>History
    </a>
    <a href="index.html" class="btn btn-outline-light btn-sm">
        <i class="fas fa-sign-out-alt me-1"></i>Logout
    </a>
</nav>

<div class="container py-4">
    <h3 class="text-center mb-1 fw-bold">Select Your Symptoms</h3>
    <p class="text-center text-muted mb-4">Choose all symptoms you are experiencing</p>

    <form action="symptoms" method="post">
        <div class="row g-4">

            <!-- General -->
            <div class="col-12">
                <h5 class="section-title"><i class="fas fa-thermometer-half me-2"></i>General</h5>
                <div class="row g-2 mt-1">
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="fever" class="me-2">🌡️ Fever</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="cough" class="me-2">😷 Cough</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="cold" class="me-2">🤧 Cold</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="weakness" class="me-2">😴 Weakness</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="body_ache" class="me-2">🦴 Body Ache</label></div>
                </div>
            </div>

            <!-- Cardiology -->
            <div class="col-12">
                <h5 class="section-title"><i class="fas fa-heart me-2"></i>Heart / Chest</h5>
                <div class="row g-2 mt-1">
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="chest_pain" class="me-2">💔 Chest Pain</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="breathlessness" class="me-2">😮‍💨 Breathlessness</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="palpitations" class="me-2">💓 Palpitations</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="dizziness" class="me-2">😵 Dizziness</label></div>
                </div>
            </div>

            <!-- Orthopedic -->
            <div class="col-12">
                <h5 class="section-title"><i class="fas fa-walking me-2"></i>Bones / Joints</h5>
                <div class="row g-2 mt-1">
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="joint_pain" class="me-2">🦵 Joint Pain</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="swelling" class="me-2">🫁 Swelling</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="back_pain" class="me-2">🔙 Back Pain</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="stiffness" class="me-2">🧍 Stiffness</label></div>
                </div>
            </div>

            <!-- Neurology -->
            <div class="col-12">
                <h5 class="section-title"><i class="fas fa-brain me-2"></i>Neurological</h5>
                <div class="row g-2 mt-1">
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="severe_headache" class="me-2">🤕 Severe Headache</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="seizures" class="me-2">⚡ Seizures</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="numbness" class="me-2">😶 Numbness</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="blurred_speech" class="me-2">🗣️ Blurred Speech</label></div>
                </div>
            </div>

            <!-- ENT -->
            <div class="col-12">
                <h5 class="section-title"><i class="fas fa-ear-listen me-2"></i>ENT</h5>
                <div class="row g-2 mt-1">
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="ear_pain" class="me-2">👂 Ear Pain</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="hearing_loss" class="me-2">🔇 Hearing Loss</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="throat_pain" class="me-2">🤒 Throat Pain</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="nose_bleed" class="me-2">🩸 Nose Bleed</label></div>
                </div>
            </div>

            <!-- Eye -->
            <div class="col-12">
                <h5 class="section-title"><i class="fas fa-eye me-2"></i>Eyes</h5>
                <div class="row g-2 mt-1">
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="eye_pain" class="me-2">👁️ Eye Pain</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="blurred_vision" class="me-2">🫦 Blurred Vision</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="eye_redness" class="me-2">🔴 Eye Redness</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="watering" class="me-2">💧 Watering</label></div>
                </div>
            </div>

            <!-- Skin -->
            <div class="col-12">
                <h5 class="section-title"><i class="fas fa-hand-dots me-2"></i>Skin</h5>
                <div class="row g-2 mt-1">
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="skin_rash" class="me-2">🔴 Skin Rash</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="itching" class="me-2">🤚 Itching</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="acne" class="me-2">🌡️ Acne</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="hair_loss" class="me-2">💇 Hair Loss</label></div>
                </div>
            </div>

            <!-- Gastro -->
            <div class="col-12">
                <h5 class="section-title"><i class="fas fa-stomach me-2"></i>Digestive</h5>
                <div class="row g-2 mt-1">
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="stomach_pain" class="me-2">🤢 Stomach Pain</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="vomiting" class="me-2">🤮 Vomiting</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="diarrhea" class="me-2">🚽 Diarrhea</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="acidity" class="me-2">🔥 Acidity</label></div>
                    <div class="col-6 col-md-3"><label class="symptom-card card p-3 w-100">
                        <input type="checkbox" name="symptoms" value="bloating" class="me-2">💨 Bloating</label></div>
                </div>
            </div>

        </div>

        <div class="text-center mt-5">
            <button type="submit" class="btn btn-submit text-white px-5 py-3 fw-bold fs-5">
                <i class="fas fa-search-plus me-2"></i>Find My Department
            </button>
        </div>
    </form>
</div>
</body>
</html>
